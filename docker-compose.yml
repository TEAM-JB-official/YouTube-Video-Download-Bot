version: '3.8'

services:
  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./downloads:/app/downloads
      - ./bot/logs:/app/bot/logs
    ports:
      - "8000:8000"
    networks:
      - bot_net

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - bot_net

volumes:
  mongo_data:

networks:
  bot_net:
